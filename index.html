<!DOCTYPE html>
<html>
  <head>
    <title>Student Loan Management System</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h2>Student Loan Management System</h2>

      <h3>Students</h3>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="studentTable"></tbody>
      </table>

      <!-- LOAN SECTION -->

      <div id="loanSection" class="section">
        <h2>Loan Workspace</h2>

        <form id="loanForm">
          <input
            type="number"
            id="loanAmount"
            placeholder="Loan Amount"
            required
          />

          <select id="loanType">
            <option>Tuition</option>
            <option>Books</option>
            <option>Living Expenses</option>
          </select>

          <select id="loanStatus">
            <option>Pending</option>
            <option>Approved</option>
            <option>Disbursed</option>
          </select>

          <button class="save">Save Loan</button>
        </form>

        <table>
          <thead>
            <tr>
              <th>Amount</th>
              <th>Type</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="loanTable"></tbody>
        </table>
      </div>

      <!-- PAYMENT SECTION -->

      <div id="paymentSection" class="section">
        <h2>Payment Workspace</h2>

        <form id="paymentForm">
          <input
            type="number"
            id="paymentAmount"
            placeholder="Payment Amount"
            required
          />

          <input type="date" id="paymentDate" required />

          <select id="paymentMethod">
            <option>Cash</option>
            <option>Bank Transfer</option>
            <option>Online Payment</option>
          </select>

          <button class="save">Save Payment</button>
        </form>

        <table>
          <thead>
            <tr>
              <th>Amount</th>
              <th>Date</th>
              <th>Method</th>
            </tr>
          </thead>

          <tbody id="paymentTable"></tbody>
        </table>

        <h3>Total Paid: ₱<span id="totalPaid">0</span></h3>

        <h3>Remaining Balance: ₱<span id="remaining">0</span></h3>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
